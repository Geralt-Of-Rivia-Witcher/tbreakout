name: Auto-publish to AUR

on:
  workflow_run:
    workflows: ["Release binaries"]
    types:
      - completed

jobs:
  aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Extract tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Install required packages
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm base-devel git openssh github-cli

      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Clone AUR repo
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no
        run: |
          git clone ssh://aur@aur.archlinux.org/tbreakout-bin.git aur

      - name: Download Linux binary from GitHub Release
        run: |
          gh release download "$TAG" \
            --repo Geralt-Of-Rivia-Witcher/tbreakout \
            --pattern "tbreakout-linux-amd64"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        run: |
          SHA=$(sha256sum tbreakout-linux-amd64 | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_ENV

      - name: Update PKGBUILD
        run: |
          cd aur
          sed -i \
            -e "s/^pkgver=.*/pkgver=${VERSION}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            -e "s/^sha256sums=.*/sha256sums=('${SHA256}')/" \
            PKGBUILD

      - name: Regenerate .SRCINFO
        run: |
          cd aur
          makepkg --printsrcinfo > .SRCINFO

      - name: Commit and push to AUR
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no
        run: |
          cd aur
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "tbreakout-bin ${VERSION}"
          git push origin master
