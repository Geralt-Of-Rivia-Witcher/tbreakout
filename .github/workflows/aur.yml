name: Auto-publish to AUR

on:
  workflow_run:
    workflows: ["Release binaries"]
    types:
      - completed

jobs:
  aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Extract tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Install required packages
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm base-devel git openssh github-cli sudo

      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Clone AUR repo
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no
        run: |
          set -e
          rm -rf aur
          git clone ssh://aur@aur.archlinux.org/tbreakout-bin.git aur
          ls -la aur
          test -d aur/.git

      - name: Download Linux binary from GitHub Release
        run: |
          gh release download "$TAG" \
            --repo Geralt-Of-Rivia-Witcher/tbreakout \
            --pattern "tbreakout-linux-amd64"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        run: |
          SHA=$(sha256sum tbreakout-linux-amd64 | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_ENV

      - name: Update PKGBUILD
        run: |
          cd aur

          sed -i \
            -e "s/^pkgver=.*/pkgver=${VERSION}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            PKGBUILD

          # Replace sha256sums block safely, without dropping following functions
          awk -v hash="${SHA256}" '
            /^sha256sums=\(/ {
              print "sha256sums=('\"" hash "\"')"
              if ($0 ~ /\)/) skip=0
              else skip=1
              next
            }
            skip && /^[[:space:]]*\)/ { skip=0; next }
            !skip { print }
          ' PKGBUILD > PKGBUILD.new

          mv PKGBUILD.new PKGBUILD

      - name: Create non-root build user
        run: |
          useradd -m builder
          chown -R builder:builder aur

      - name: Regenerate .SRCINFO
        working-directory: aur
        run: |
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

      - name: Commit and push to AUR
        working-directory: aur
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no
        run: |
          git config --global --add safe.directory "$(pwd)"
          git rev-parse --is-inside-work-tree
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git status
          git add PKGBUILD .SRCINFO
          git commit -m "tbreakout-bin ${VERSION}"
          git push origin master
